<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensaive Tier 1 - Hardware Simulator</title>
    <style>
        body { font-family: Arial, sans-serif; background: #070B19; color: #E2E8F0; padding: 20px; max-width: 600px; margin: 0 auto; }
        .brand { font-size: 24px; font-weight: bold; color: #38BDF8; text-align: center; margin-bottom: 20px; }
        .card { background: #0F172A; border: 1px solid #1E293B; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        h3 { font-size: 14px; color: #94A3B8; text-transform: uppercase; border-bottom: 1px solid #1E293B; padding-bottom: 10px; margin-top: 0; }
        .slider-box { margin-bottom: 15px; }
        .flex-label { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .val-num { color: #38BDF8; }
        input[type="range"] { width: 100%; accent-color: #38BDF8; }
        input[type="text"] { width: 100%; padding: 8px; background: #070B19; border: 1px solid #334155; color: #FFF; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-green { background: #10B981; color: white; }
        .btn-yellow { background: #F59E0B; color: white; }
        .btn-red { background: #EF4444; color: white; }
    </style>
</head>
<body>

    <div class="brand">🧬 Sensaive Tier 1</div>

    <div class="card">
        <h3>🚨 Điều hướng 3 Cấp độ Triage</h3>
        <button class="btn btn-green" onclick="simulateTriage(1)">🟢 Cấp 1: Bình Thường</button>
        <button class="btn btn-yellow" onclick="simulateTriage(2)">🟡 Cấp 2: Cảnh báo & AI Đàm thoại</button>
        <button class="btn btn-red" onclick="simulateTriage(3)">🚨 Cấp 3: Té ngã khẩn cấp 115</button>
    </div>

    <div class="card">
        <h3>📊 Giả lập Sinh hiệu thời gian thực</h3>
        <div class="slider-box">
            <div class="flex-label"><span>Nhịp tim (Heart Rate)</span><span class="val-num" id="txt-hr">75 BPM</span></div>
            <input type="range" id="input-hr" min="40" max="160" value="75" oninput="pushData()">
        </div>
        <div class="slider-box">
            <div class="flex-label"><span>SpO2 (Oxy trong máu)</span><span class="val-num" id="txt-spo2">98 %</span></div>
            <input type="range" id="input-spo2" min="75" max="100" value="98" oninput="pushData()">
        </div>
        <div class="slider-box">
            <div class="flex-label"><span>Nhịp thở (Respiratory)</span><span class="val-num" id="txt-rr">16 lần/p</span></div>
            <input type="range" id="input-rr" min="8" max="38" value="16" oninput="pushData()">
        </div>
        <div class="slider-box">
            <div class="flex-label"><span>Nhiệt độ (°C)</span><span class="val-num" id="txt-temp">36.7 °C</span></div>
            <input type="range" id="input-temp" min="34.5" max="41.0" step="0.1" value="36.7" oninput="pushData()">
        </div>
        <div class="slider-box">
            <div class="flex-label"><span>Huyết áp (mmHg)</span></div>
            <input type="text" id="input-bp" value="120/80" onchange="pushData()">
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // Đã nhúng Cấu hình Firebase Server Châu Á chuẩn xác của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyCbaNZMLJqsH1W3VAa81GaaY7ocaTbZeqw",
            authDomain: "sensaive-demo.firebaseapp.com",
            databaseURL: "https://sensaive-demo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sensaive-demo",
            storageBucket: "sensaive-demo.firebasestorage.app",
            messagingSenderId: "289646147734",
            appId: "1:289646147734:web:c13d029f86dbc5181ceab7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("sensaive_core_v1");

        let currentLvl = 1;

        function pushData(voiceCommand = "") {
            let hr = parseInt(document.getElementById("input-hr").value);
            let spo2 = parseInt(document.getElementById("input-spo2").value);
            let rr = parseInt(document.getElementById("input-rr").value);
            let temp = parseFloat(document.getElementById("input-temp").value);
            let bp = document.getElementById("input-bp").value;

            document.getElementById("txt-hr").innerText = hr + " BPM";
            document.getElementById("txt-spo2").innerText = spo2 + " %";
            document.getElementById("txt-rr").innerText = rr + " lần/p";
            document.getElementById("txt-temp").innerText = temp + " °C";

            db.set({
                heartRate: hr, spo2: spo2, respiratoryRate: rr, temperature: temp, bloodPressure: bp,
                triageLevel: currentLvl,
                voiceCommand: voiceCommand,
                timestamp: Date.now()
            });
        }

        function simulateTriage(level) {
            currentLvl = level;
            if (level === 1) {
                document.getElementById("input-hr").value = 75;
                document.getElementById("input-spo2").value = 98;
                document.getElementById("input-rr").value = 16;
                pushData("Hệ thống trở lại bình thường.");
            } else if (level === 2) {
                document.getElementById("input-hr").value = 112;
                document.getElementById("input-spo2").value = 93;
                document.getElementById("input-rr").value = 24;
                pushData("Cảnh báo Sensaive AI. Hệ thống phát hiện nhịp thở tăng cao bất thường. Yêu cầu kiểm tra lâm sàng bệnh án ngay lập tức.");
            } else if (level === 3) {
                document.getElementById("input-hr").value = 142;
                document.getElementById("input-spo2").value = 86;
                pushData("Báo động đỏ. Phát hiện va đập gia tốc 4.5 G. Bệnh nhân có dấu hiệu té ngã. Đang kích hoạt radar gọi một một năm.");
            }
        }
        
        pushData();
    </script>
</body>
</html>
