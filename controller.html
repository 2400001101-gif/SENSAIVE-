<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensaive Tier 1 - Hardware Controller</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0b1329; color: #f1f5f9; padding: 20px; max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; color: #38bdf8; }
        .card { background: #1c2541; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #3a506b; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #94a3b8; }
        .flex-row { display: flex; justify-content: space-between; align-items: center; }
        .val { font-size: 18px; font-weight: bold; color: #38bdf8; }
        input[type="range"] { width: 100%; margin-top: 5px; accent-color: #38bdf8; cursor: pointer; }
        input[type="text"] { width: 100%; padding: 8px; background: #0b1329; border: 1px solid #3a506b; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; text-transform: uppercase; }
        .btn-1 { background: #10b981; color: white; }
        .btn-2 { background: #f59e0b; color: white; }
        .btn-3 { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <h2>🧬 Sensaive Tier 1 Controller</h2>
    <p style="text-align: center; font-size: 12px; color: #64748b; margin-bottom: 20px;">Trạm phát tín hiệu sinh hiệu Realtime</p>

    <div class="card">
        <label>🚨 ĐIỀU HƯỚNG CẤP ĐỘ TRIAGE</label>
        <button class="btn btn-1" id="btn-triage-1">🟢 Cấp 1: Bình Thường</button>
        <button class="btn btn-2" id="btn-triage-2">🟡 Cấp 2: Bất Thường (Nghi Ngờ)</button>
        <button class="btn btn-3" id="btn-triage-3">🔴 Cấp 3: Té Ngã Nguy Kịch (115)</button>
    </div>

    <div class="card">
        <div class="flex-row"><label>Nhịp tim (Heart Rate)</label><span class="val" id="lbl-hr">75 BPM</span></div>
        <input type="range" id="range-hr" min="40" max="150" value="75">
    </div>

    <div class="card">
        <div class="flex-row"><label>Nồng độ Oxy (SpO2)</label><span class="val" id="lbl-spo2">98 %</span></div>
        <input type="range" id="range-spo2" min="80" max="100" value="98">
    </div>

    <div class="card">
        <div class="flex-row"><label>Huyết áp (Blood Pressure)</label></div>
        <input type="text" id="val-bp" value="120/80">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // Tích hợp thông tin tài khoản Firebase thật của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyCbaNZMLJqsH1W3VAa81GaaY7ocaTbZeqw",
            authDomain: "sensaive-demo.firebaseapp.com",
            databaseURL: "https://sensaive-demo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sensaive-demo",
            storageBucket: "sensaive-demo.firebasestorage.app",
            messagingSenderId: "289646147734",
            appId: "1:289646147734:web:c13d029f86dbc5181ceab7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentLvl = 1;

        // Hàm đẩy dữ liệu đồng bộ lên Firebase
        function sendData() {
            let hr = parseInt(document.getElementById("range-hr").value);
            let spo2 = parseInt(document.getElementById("range-spo2").value);
            let bp = document.getElementById("val-bp").value;

            document.getElementById("lbl-hr").innerText = hr + " BPM";
            document.getElementById("lbl-spo2").innerText = spo2 + " %";

            set(ref(db, "sensaive_data"), {
                heartRate: hr,
                spo2: spo2,
                bloodPressure: bp,
                triageLevel: currentLvl,
                isFall: currentLvl === 3 ? true : false,
                timestamp: Date.now()
            });
        }

        // Lắng nghe sự kiện kéo thanh trượt
        document.getElementById("range-hr").addEventListener("input", sendData);
        document.getElementById("range-spo2").addEventListener("input", sendData);
        document.getElementById("val-bp").addEventListener("change", sendData);

        // Hàm chuyển đổi cấp độ Triage nhanh
        function changeTriage(lvl) {
            currentLvl = lvl;
            if(lvl === 1) {
                document.getElementById("range-hr").value = 75;
                document.getElementById("range-spo2").value = 98;
                document.getElementById("val-bp").value = "120/80";
            } else if(lvl === 2) {
                document.getElementById("range-hr").value = 115;
                document.getElementById("range-spo2").value = 92;
            } else if(lvl === 3) {
                document.getElementById("range-hr").value = 140;
                document.getElementById("range-spo2").value = 85;
            }
            sendData();
        }

        // Đăng ký sự kiện click cho các nút bấm
        document.getElementById("btn-triage-1").addEventListener("click", () => changeTriage(1));
        document.getElementById("btn-triage-2").addEventListener("click", () => changeTriage(2));
        document.getElementById("btn-triage-3").addEventListener("click", () => changeTriage(3));

        // Khởi động trạng thái mặc định
        changeTriage(1);
    </script>
</body>
</html>
