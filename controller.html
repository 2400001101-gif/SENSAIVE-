<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensaive - Trạm Giả Lập Phát Sinh Hiệu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg-color: #F0F4F8;
    --card-bg: #FFFFFF;
    --text-main: #102A43;
    --text-sub: #627D98;
    --primary-blue: #0052CC;
    --teal: #00A699;
    --red-alert: #E53E3E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

  body {
    background-color: var(--bg-color);
    color: var(--text-main);
    padding: 50px 20px;
    display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }

  .admin-panel {
    background: var(--card-bg); border-radius: 24px; padding: 35px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.04); width: 100%; max-width: 480px;
    border: 1px solid rgba(0,82,204,0.08);
  }

  h1 { font-size: 24px; font-weight: 800; color: var(--primary-blue); margin-bottom: 6px; text-align: center; letter-spacing: -0.5px; }
  .subtitle { font-size: 13px; color: var(--text-sub); text-align: center; margin-bottom: 30px; line-height: 1.4; }

  .control-group { margin-bottom: 24px; background: #F8FAFC; padding: 16px; border-radius: 12px; border: 1px solid #E2E8F0; }
  .control-label { font-size: 13px; font-weight: 700; color: var(--text-main); margin-bottom: 12px; display: flex; justify-content: space-between; text-transform: uppercase; letter-spacing: 0.5px; }
  .current-val { color: var(--primary-blue); font-weight: 800; font-size: 15px; }

  /* Thanh kéo Slider thiết kế lại cực mượt */
  .slider {
    width: 100%; -webkit-appearance: none; height: 8px; border-radius: 50px;
    background: #E2E8F0; outline: none; margin: 8px 0; cursor: pointer;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
    background: var(--primary-blue); border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.15); transition: transform 0.1s;
  }
  .slider::-webkit-slider-thumb:hover { transform: scale(1.15); }

  /* Khu vực chọn Kịch bản nhanh */
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
  .btn {
    padding: 15px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s ease; background: #E4EFFF; color: var(--primary-blue);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,52,204,0.1); }
  .btn:active { transform: translateY(0); }
  
  .btn.btn-normal { background: #E6F4EA; color: #137333; }
  .btn.btn-normal:hover { box-shadow: 0 4px 12px rgba(19,115,51,0.15); }
  
  .btn.btn-warning { background: #FEF7E0; color: #B06000; }
  .btn.btn-warning:hover { box-shadow: 0 4px 12px rgba(176,96,0,0.15); }
  
  .btn.btn-sos { 
    background: #FCE8E6; color: var(--red-alert); grid-column: span 2; 
    font-size: 15px; border: 2px dashed var(--red-alert); margin-top: 4px;
  }
  .btn.btn-sos:hover { background: #FAD2CF; box-shadow: 0 4px 15px rgba(229,62,62,0.2); }

  #sync-indicator {
    text-align: center; font-size: 12px; color: var(--teal); font-weight: 600; margin-top: 25px;
    display: flex; align-items: center; justify-content: center; gap: 6px; background: #E6F6F5; padding: 8px; border-radius: 20px;
  }
  .pulse-dot { width: 6px; height: 6px; background: var(--teal); border-radius: 50%; animation: pulse 1s infinite alternate; }
  @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
</style>
</head>
<body>

  <div class="admin-panel">
    <h1>Sensaive Simulator</h1>
    <div class="subtitle">Bảng điều khiển giả lập tín hiệu phần cứng Vòng tay thông minh (Tier 1 & Tier 2)</div>

    <div class="control-group">
      <div class="control-label">Nhịp tim (Heart Rate): <span class="current-val" id="hr-display">75 BPM</span></div>
      <input type="range" min="40" max="150" value="75" class="slider" id="hr-slider">
    </div>

    <div class="control-group">
      <div class="control-label">Nồng độ Oxy (SpO2): <span class="current-val" id="spo2-display">98%</span></div>
      <input type="range" min="80" max="100" value="98" class="slider" id="spo2-slider">
    </div>

    <div class="control-label" style="margin-left: 4px;">Kịch bản sự cố khẩn cấp:</div>
    <div class="btn-grid">
      <button class="btn btn-normal" onclick="setScenario('NORMAL', 75, 98)">🟢 Cơ thể bình thường</button>
      <button class="btn btn-warning" onclick="setScenario('WARNING', 118, 93)">🟡 Cảnh báo nhịp tim cao</button>
      <button class="btn btn-sos" onclick="setScenario('SOS', 52, 89)">🚨 GIẢ LẬP TÉ NGÃ (SOS KHẨN CẤP)</button>
    </div>

    <div id="sync-indicator"><div class="pulse-dot"></div> Hệ thống đang truyền gói dữ liệu trực tuyến thời gian thực</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // Mã cấu hình Firebase đồng bộ đồng nhất với file index.html
    const firebaseConfig = {
      apiKey: "AIzaSyCbaNZMLJqsH1W3VAa81GaaY7ocaTbZeqw",
      authDomain: "sensaive-demo.firebaseapp.com",
      databaseURL: "https://sensaive-demo-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sensaive-demo",
      storageBucket: "sensaive-demo.firebasestorage.app",
      messagingSenderId: "289646147734",
      appId: "1:289646147734:web:c13d029f86dbc5181ceab7",
      measurementId: "G-ZTN2T5DMWS"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const hrSlider = document.getElementById('hr-slider');
    const spo2Slider = document.getElementById('spo2-slider');
    let currentStatus = 'NORMAL';

    // Đẩy dữ liệu thô lên đám mây Firebase
    function updateFirebase() {
      db.ref('sensaive/device1').set({
        heartRate: parseInt(hrSlider.value),
        spo2: parseInt(spo2Slider.value),
        status: currentStatus
      });
    }

    // Theo dõi hành vi kéo thanh trượt Nhịp tim
    hrSlider.addEventListener('input', (e) => {
      document.getElementById('hr-display').innerText = e.target.value + " BPM";
      updateFirebase();
    });

    // Theo dõi hành vi kéo thanh trượt SpO2
    spo2Slider.addEventListener('input', (e) => {
      document.getElementById('spo2-display').innerText = e.target.value + "%";
      updateFirebase();
    });

    // Hàm thực thi các nút kịch bản dựng sẵn
    function setScenario(status, hr, spo2) {
      currentStatus = status;
      hrSlider.value = hr;
      spo2Slider.value = spo2;
      
      document.getElementById('hr-display').innerText = hr + " BPM";
      document.getElementById('spo2-display').innerText = spo2 + "%";
      
      updateFirebase();
    }
  </script>
</body>
</html>
