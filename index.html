<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensaive Tier 2 - Phone View</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; padding: 15px; margin: 0; }
        .header { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; margin-bottom: 15px; }
        .status-text { font-weight: bold; color: #10b981; font-size: 16px; margin-top: 5px; }
        
        .box-vital { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; }
        .vital-title { font-size: 14px; color: #64748b; font-weight: bold; }
        .vital-value { font-size: 32px; font-weight: bold; color: #0f172a; }
        
        /* Chế độ báo động Đỏ cấp 3 toàn màn hình */
        #fall-screen { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: #ef4444; color: white; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; box-sizing: border-box; padding: 20px; }
        #fall-screen h1 { font-size: 36px; animation: blink 1s infinite; margin: 0; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color:#0284c7;">🩺 Sensaive Mobile</h2>
        <div id="app-status" class="status-text">🟢 Sinh hiệu ổn định</div>
    </div>

    <div style="padding: 5px; font-size: 13px; color: #64748b; margin-bottom: 5px;">Bệnh nhân: <b>Nguyễn Văn Minh</b></div>

    <div class="box-vital" id="card-hr">
        <div>
            <div class="vital-title">❤️ NHỊP TIM (HR)</div>
            <div class="vital-value" id="view-hr">--</div>
        </div>
        <div style="font-size: 12px; color: #64748b;">BPM</div>
    </div>

    <div class="box-vital" id="card-spo2">
        <div>
            <div class="vital-title">💧 NỒNG ĐỘ OXY (SpO2)</div>
            <div class="vital-value" id="view-spo2">--</div>
        </div>
        <div style="font-size: 12px; color: #64748b;">%</div>
    </div>

    <div class="box-vital">
        <div>
            <div class="vital-title">🩸 HUYẾT ÁP</div>
            <div class="vital-value" id="view-bp">--/--</div>
        </div>
        <div style="font-size: 12px; color: #64748b;">mmHg</div>
    </div>

    <div id="fall-screen">
        <h1>🚨 PHÁT HIỆN TÉ NGÃ 🚨</h1>
        <p style="font-weight: bold; margin-top: 10px;">Hệ thống ghi nhận va chạm mạnh và trạng thái bất động!</p>
        <p style="font-size: 13px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; max-width: 80%;">Đang bẻ lộ trình truyền dữ liệu chuẩn FHIR lên tổng đài y tế cấp cứu 115...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // Tích hợp cấu hình Firebase thật (Trùng khớp hoàn toàn với file phát tín hiệu)
        const firebaseConfig = {
            apiKey: "AIzaSyCbaNZMLJqsH1W3VAa81GaaY7ocaTbZeqw",
            authDomain: "sensaive-demo.firebaseapp.com",
            databaseURL: "https://sensaive-demo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sensaive-demo",
            storageBucket: "sensaive-demo.firebasestorage.app",
            messagingSenderId: "289646147734",
            appId: "1:289646147734:web:c13d029f86dbc5181ceab7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // LẮNG NGHE BIẾN THIÊN REALTIME LIÊN TỤC 24/7 TỪ FIREBASE
        onValue(ref(db, "sensaive_data"), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            // Cập nhật số liệu hiển thị tức thì ra màn hình điện thoại
            document.getElementById("view-hr").innerText = data.heartRate || "--";
            document.getElementById("view-spo2").innerText = data.spo2 || "--";
            document.getElementById("view-bp").innerText = data.bloodPressure || "--/--";

            let txtStatus = document.getElementById("app-status");
            let fallScreen = document.getElementById("fall-screen");

            // Logic xử lý đồ họa giao diện động dựa trên 3 mức độ nguy cơ (Triage)
            if(data.triageLevel === 3) {
                fallScreen.style.display = "flex";
            } else {
                fallScreen.style.display = "none";
                
                if(data.triageLevel === 2) {
                    txtStatus.innerText = "🟡 Cảnh báo sinh hiệu bất thường";
                    txtStatus.style.color = "#f59e0b";
                    document.getElementById("card-hr").style.background = "#fffbeb";
                    document.getElementById("card-spo2").style.background = "#fffbeb";
                } else {
                    txtStatus.innerText = "🟢 Sinh hiệu ổn định";
                    txtStatus.style.color = "#10b981";
                    document.getElementById("card-hr").style.background = "white";
                    document.getElementById("card-spo2").style.background = "white";
                }
            }
        });
    </script>
</body>
</html>
